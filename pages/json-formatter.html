<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSON Formatter</title>
    <style>
        :root {
            --background: #1e1e1e;
            --surface-container: #252526;
            --primary: #f1f1f1;
            --outline: #9a9a9a;
            --on-surface: #ffffff;
            --on-surface-variant: #c8c8c8;
            --shadow-focus: 0 0 0 2px rgba(255, 255, 255, 0.16);
            --background-dot: rgba(255, 255, 255, 0.028);
            --input-background: #2e2e2e;
            --input-border: #444444;
            --error: #ffb4ab;
            --error-border: #8d3131;
            --error-background: rgba(141, 49, 49, 0.18);
            --button-background: #383838;
            --button-hover: #454545;
            --headline-font: "Trebuchet MS", "Avenir Next", "Segoe UI", sans-serif;
            --body-font: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --mono-font: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
            --icon-button-hover: #ffffff;
        }

        body[data-theme="light"] {
            --background: #f3efe8;
            --surface-container: #ede6dc;
            --primary: #2d2924;
            --outline: #7a7269;
            --on-surface: #2a2621;
            --on-surface-variant: #6a6259;
            --shadow-focus: 0 0 0 2px rgba(45, 41, 36, 0.12);
            --background-dot: rgba(122, 114, 105, 0.07);
            --input-background: #f7f1e8;
            --input-border: #c8bcae;
            --error: #b3261e;
            --error-border: #c6473b;
            --error-background: rgba(179, 38, 30, 0.08);
            --button-background: #ddd2c4;
            --button-hover: #d0c2b1;
            --icon-button-hover: #2a2621;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
        }

        body {
            font-family: var(--body-font);
            color: var(--on-surface);
            background-color: var(--background);
            background-image: radial-gradient(circle at 2px 2px, var(--background-dot) 1px, transparent 0);
            background-size: 24px 24px;
            transition: background-color 0.25s ease, color 0.25s ease, background-image 0.25s ease;
        }

        button,
        textarea {
            font: inherit;
        }

        button {
            border: 0;
            background: transparent;
            color: inherit;
            cursor: pointer;
        }

        .icon-glyph {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 4rem;
            padding: 0 1.5rem;
            background: var(--surface-container);
        }

        .site-title {
            margin: 0;
            font-family: var(--headline-font);
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.03em;
            color: var(--primary);
            white-space: nowrap;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .icon-button {
            color: var(--on-surface-variant);
            transition: color 0.2s ease, transform 0.15s ease;
        }

        .icon-button:hover {
            color: var(--icon-button-hover);
        }

        .icon-button:active {
            transform: scale(0.9);
        }

        .page {
            padding: 6rem 2.5rem 5rem;
        }

        .content {
            max-width: 64rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        textarea {
            width: 100%;
            min-height: 20rem;
            padding: 1rem;
            border: 1px solid var(--input-border);
            border-radius: 5px;
            background-color: var(--input-background);
            color: var(--on-surface);
            font-family: var(--mono-font);
            font-size: 1rem;
            line-height: 1.5;
            resize: vertical;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }

        textarea:focus {
            outline: none;
            box-shadow: var(--shadow-focus);
        }

        textarea.is-invalid {
            border-color: var(--error-border);
            background-color: var(--error-background);
        }

        .action-row {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
        }

        .format-button {
            padding: 0.8rem 1.2rem;
            border-radius: 5px;
            background: var(--button-background);
            color: var(--on-surface);
            font-weight: 700;
            transition: background-color 0.2s ease, transform 0.15s ease;
        }

        .format-button:hover {
            background: var(--button-hover);
        }

        .format-button:active {
            transform: scale(0.98);
        }

        .validation-message {
            min-height: 1.5rem;
            color: var(--error);
            font-weight: 700;
        }

        .validation-detail {
            min-height: 1.25rem;
            margin-top: 0.25rem;
            color: var(--on-surface-variant);
            font-size: 0.875rem;
        }

        @media (max-width: 767px) {
            .page {
                padding: 5.5rem 1.25rem 5rem;
            }

            .topbar {
                padding: 0 1rem;
            }

            .action-row {
                align-items: flex-start;
                flex-direction: column;
                gap: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <h1 class="site-title">JSON Formatter</h1>
        <div class="topbar-actions">
            <button aria-label="Switch to light theme" class="icon-button" id="theme-toggle" type="button">
                <span aria-hidden="true" class="icon-glyph" id="theme-toggle-icon">◐</span>
            </button>
        </div>
    </header>

    <main class="page">
        <div class="content">
            <label for="jsonInput">Paste JSON</label>
            <textarea id="jsonInput" placeholder='Paste your JSON here...'></textarea>

            <div class="action-row">
                <button class="format-button" id="formatButton" type="button">Format</button>
                <div>
                    <div aria-live="polite" class="validation-message" id="validationMessage"></div>
                    <div aria-live="polite" class="validation-detail" id="validationDetail"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const themeToggleButton = document.getElementById('theme-toggle');
        const themeToggleIcon = document.getElementById('theme-toggle-icon');
        const themeStorageKey = 'dev-tools-theme';
        const jsonInput = document.getElementById('jsonInput');
        const formatButton = document.getElementById('formatButton');
        const validationMessage = document.getElementById('validationMessage');
        const validationDetail = document.getElementById('validationDetail');

        function applyTheme(theme) {
            const nextTheme = theme === 'light' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', nextTheme);

            const isLight = nextTheme === 'light';
            themeToggleButton.setAttribute('aria-label', isLight ? 'Switch to dark theme' : 'Switch to light theme');
            themeToggleButton.setAttribute('title', isLight ? 'Switch to dark theme' : 'Switch to light theme');
            themeToggleIcon.textContent = isLight ? '◑' : '◐';
        }

        function toggleTheme() {
            const currentTheme = document.body.getAttribute('data-theme') === 'light' ? 'light' : 'dark';
            const nextTheme = currentTheme === 'light' ? 'dark' : 'light';
            applyTheme(nextTheme);
            window.localStorage.setItem(themeStorageKey, nextTheme);
        }

        function clearValidationState() {
            jsonInput.classList.remove('is-invalid');
            validationMessage.textContent = '';
            validationDetail.textContent = '';
        }

        function formatJson() {
            try {
                const parsedJson = JSON.parse(jsonInput.value);
                jsonInput.value = JSON.stringify(parsedJson, null, 2);
                clearValidationState();
            } catch (error) {
                jsonInput.classList.add('is-invalid');
                validationMessage.textContent = 'JSON is not valid';
                validationDetail.textContent = error && error.message ? error.message : '';
            }
        }

        applyTheme(window.localStorage.getItem(themeStorageKey) || 'dark');
        themeToggleButton.addEventListener('click', toggleTheme);
        formatButton.addEventListener('click', formatJson);
        jsonInput.addEventListener('input', clearValidationState);
    </script>
</body>
</html>
